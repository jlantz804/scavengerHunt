<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brinleigh's Surprise Gift</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Pacifico&display=swap" rel="stylesheet">
</head>
<body class="pink-theme">
    <div id="heart-container"></div>
    
    <div class="container" id="question-container">
        <button id="skip-btn" class="corner-btn">Skip</button>
        <h1 id="question-text">Loading...</h1>
        <div class="button-group">
            <button id="his-btn">Joey</button>
            <button id="her-btn">Brinleigh</button>
        </div>
    </div>

    <div class="container hidden" id="final-container">
        <h1>No matter what you choose, I choose you ❤️</h1>
        <button id="reveal-surprise-btn">reveal suprise</button>
    </div>

    <div class="container hidden" id="surprise-container">
        <h1>Surprise! 🌹</h1>
        <p>Perked up White Boy&trade; busts it down sensual style, is he goated with the sauce?  More at 10pm</p>
        <div class="button-group" id="date-buttons">
            <button id="yes-btn">Yes</button>
            <button id="no-btn">No</button>
        </div>
    </div>

    <div class="container hidden" id="success-container">
        <h1 class="fancy-font">Is that my clicker?</h1>
        <button id="reset-btn" class="reset-btn">Start Over</button>
    </div>

    <div class="theme-toggle-container">
        <button id="theme-toggle">Switch to Red Theme</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
